[options]
; Odoo Configuration for AI Employee Platinum Tier
; Cloud Deployment - Docker Container

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = False
; db_password is set via environment variable

; Networking
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Performance
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Addons
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Data
data_dir = /var/lib/odoo

; Logging
log_level = info
logfile = /var/log/odoo/odoo.log
log_handler = :INFO

; Security
list_db = False
admin_passwd = False
