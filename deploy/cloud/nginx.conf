# Nginx Configuration for AI Employee Platinum Tier
# Reverse proxy for Odoo with HTTPS termination
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/ai-employee
#   sudo ln -s /etc/nginx/sites-available/ai-employee /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL Setup (replace your-domain.com):
#   sudo certbot --nginx -d your-domain.com

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=ai_employee:10m rate=10r/s;

# Upstream for Odoo
upstream odoo {
    server 127.0.0.1:8069;
    keepalive 32;
}

# Upstream for Odoo longpolling
upstream odoo-longpolling {
    server 127.0.0.1:8072;
}

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # Replace with your domain

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # Replace with your domain

    # SSL Configuration (Certbot will update these)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Logging
    access_log /var/log/nginx/ai-employee-access.log;
    error_log /var/log/nginx/ai-employee-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy settings
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Odoo health check endpoint
    location /health {
        limit_req zone=ai_employee burst=5 nodelay;
        proxy_pass http://odoo/web/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # AI Employee health check (custom endpoint)
    location /ai-health {
        limit_req zone=ai_employee burst=5 nodelay;
        default_type application/json;
        return 200 '{"status": "healthy", "agent": "cloud"}';
    }

    # Odoo longpolling
    location /longpolling {
        proxy_pass http://odoo-longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Odoo websocket
    location /websocket {
        proxy_pass http://odoo-longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static files with caching
    location ~* /web/static/ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Main Odoo application
    location / {
        limit_req zone=ai_employee burst=20 nodelay;
        proxy_pass http://odoo;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Increase buffer sizes for Odoo
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
    }

    location ~ ^/(web/database|jsonrpc|xmlrpc) {
        # Only allow from localhost and trusted IPs
        allow 127.0.0.1;
        # Add your trusted IPs here
        # allow your.ip.address;
        deny all;
        proxy_pass http://odoo;
    }

    # File upload size limit
    client_max_body_size 64M;
}

